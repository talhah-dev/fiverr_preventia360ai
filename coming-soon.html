<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Preventia360 | Coming Soon</title>
    <meta name="description"
        content="A new Preventia360 experience is on the way. Join the waitlist to receive launch updates." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Preventia360" />
    <meta name="google-site-verification" content="ty5IX1lWSroeHWpYDdyVgtbj_HsYvnW5B-RauzI0eTc" />
    <meta name="theme-color" content="#F5F7FA" />

    <meta property="og:title" content="Preventia360 | Coming Soon" />
    <meta property="og:description"
        content="Join the Preventia360 waitlist and be the first to hear when this page goes live." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Preventia360" />
    <meta property="og:image" content="./docs/assets/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Preventia360 | Coming Soon" />
    <meta name="twitter:description" content="Register your email for early updates from Preventia360." />
    <meta name="twitter:image" content="./docs/assets/logo.png" />

    <link rel="icon" href="./docs/assets/favicon.jpeg" />
    <link rel="apple-touch-icon" href="./docs/assets/favicon.jpeg" />

    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./docs/Style.css" />
</head>

<body class="min-h-screen bg-[#F5F7FA] text-slate-900">
    <main class="flex min-h-screen items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        <section
            class="w-full relative max-w-3xl rounded-[2rem] border border-slate-200 bg-white px-6 py-10 text-center shadow-[0_20px_60px_rgba(15,23,42,0.08)] sm:px-10 sm:py-14">



            <div class="mx-auto flex max-w-max items-center justify-center rounded-2xl bg-[#F5F7FA] px-4 py-3">
                <img src="./docs/assets/logo.png" alt="Preventia360 logo" class="h-14 w-auto object-contain sm:h-16" />
            </div>

            <h1 class="mt-8 text-4xl font-semibold tracking-tight text-[#1A2B4C] sm:text-5xl">
                Coming Soon
            </h1>

            <p class="mx-auto mt-5 max-w-2xl text-slate-600 sm:text-lg">
                This page is currently being prepared. Enter your email below and we will let you know as soon as it is
                ready.
            </p>

            <form id="waitlistForm" class="mx-auto mt-10 max-w-2xl">
                <div class="flex flex-col gap-3 sm:flex-row">
                    <input id="waitlistEmail" name="email" type="email" required placeholder="Enter your email"
                        class="h-12 w-full rounded-2xl border border-slate-200 bg-[#F5F7FA] px-5 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-[#4DB6AC] focus:ring-2 focus:ring-[#4DB6AC]/20" />
                    <button type="submit"
                        class="inline-flex h-12 items-center shrink-0 justify-center rounded-2xl bg-[#1A2B4C] px-7 font-semibold text-white transition hover:bg-[#233A61]">
                        Notify Me
                    </button>
                </div>
                <p id="waitlistMessage" class="mt-4 hidden text-[#4DB6AC]" aria-live="polite"></p>
            </form>

            <a href="/index.html" class="mt-5 block underline">Back To Home PAGE</a>



        </section>
    </main>

    <script>
        (function () {
            var form = document.getElementById('waitlistForm');
            var emailInput = document.getElementById('waitlistEmail');
            var message = document.getElementById('waitlistMessage');

            if (!form || !emailInput || !message) return;

            form.addEventListener('submit', function (event) {
                event.preventDefault();
                var email = emailInput.value.trim();
                if (!email) return;

                try {
                    var existing = JSON.parse(localStorage.getItem('preventia360Waitlist') || '[]');
                    if (!existing.includes(email)) {
                        existing.push(email);
                        localStorage.setItem('preventia360Waitlist', JSON.stringify(existing));
                    }
                } catch (error) {
                    // Ignore storage errors and still show the success state.
                }

                message.classList.remove('hidden');
                message.textContent = 'Thanks. We will notify you when this page is ready.';
                emailInput.value = '';
            });
        })();
    </script>
</body>

</html>
